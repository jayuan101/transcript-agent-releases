name: Build and Push Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to use as Docker image tag (e.g. v3.49)'
        required: true
        default: 'v3.49'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clone source from Hugging Face Space
        run: git clone https://huggingface.co/spaces/Coastline6/transcript-agent source

      - name: Set image version tag
        id: tag
        run: |
          RAW="${{ github.event.release.tag_name || inputs.release_tag }}"
          # Strip leading 'v' for the Docker tag (v3.49 → 3.49)
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "raw=$RAW" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: source
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/transcript-agent:${{ steps.tag.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/transcript-agent:latest
          build-args: |
            VERSION=${{ steps.tag.outputs.version }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
